services:

  mongodb:
    image: mongo:7
    container_name: officyna-mongodb
    environment:
      MONGO_INITDB_DATABASE: officyna
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - officyna-network

  mongo-express:
    image: mongo-express
    container_name: officyna-mongo-express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - officyna-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: officyna-app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Database
      MONGODB_URI: mongodb://mongodb:27017/officyna
      MONGODB_DATABASE: officyna
      # JWT
      JWT_SECRET: officyna-secret-key-change-in-production-min-256bits
      JWT_EXPIRATION: 86400000
      # Spring profile
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - officyna-network

volumes:
  mongo_data:

networks:
  officyna-network:
    driver: bridge