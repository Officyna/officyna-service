spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/officyna}
      database: ${MONGODB_DATABASE:officyna}
  jackson:
    read-unknown-enum-values-as-null: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:officyna-secret-key-change-in-production-min-256bits}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    br.com.officyna: INFO
    org.springframework.security: INFO

